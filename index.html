<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Universal Quantum Core</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0f1d;
            --bg-secondary: #111827;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 600px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .drop-zone {
            border: 2px dashed var(--accent-blue);
            border-radius: 12px;
            padding: 35px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.03);
            -webkit-tap-highlight-color: transparent;
        }

        .drop-zone:hover {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.05);
        }

        .drop-zone p {
            color: var(--text-main);
            font-weight: 500;
        }

        /* Input field is positioned offscreen but kept accessible for mobile browsers */
        #file-input {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }

        .file-details {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            display: none;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent-cyan);
        }

        .control-group {
            margin-top: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-process {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
            transition: opacity 0.2s;
        }

        .btn-process:active {
            opacity: 0.8;
        }

        .status-container {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: block;
            text-align: center;
        }

        #status-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent-cyan);
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>JARVIS QUANTUM CORE</h1>
        <p>Unlocked High-Performance Mobile Transcoder</p>
    </header>

    <div class="main-container">
        <div class="drop-zone" onclick="document.getElementById('file-input').click();">
            <p>Select Target Asset Data Stream</p>
            <span style="display:block; font-size:0.75rem; color:var(--text-muted); margin-top:8px;">Tap anywhere inside this box to browse</span>
        </div>
        
        <input type="file" id="file-input">

        <div class="file-details" id="file-info">
            <strong>Active Asset:</strong> <span id="file-name">None</span><br>
            <strong>Stream Size:</strong> <span id="file-size">0 KB</span>
        </div>

        <div class="control-group">
            <label for="target-format">Target Conversion Protocol</label>
            <select id="target-format">
                <optgroup label="TRUE VIDEO TRANSCODE (FFmpeg.wasm)">
                    <option value="mp4">MP4 (True H.264 Video Encode)</option>
                </optgroup>
                <optgroup label="TRUE AUDIO TRANSCODE (FFmpeg.wasm)">
                    <option value="mp3">MP3 (True Audio Layer Rewrite)</option>
                    <option value="opus">OPUS (True Voice Codec Compress)</option>
                    <option value="m4a">M4A (True Advanced Audio Coding)</option>
                    <option value="mp1">MP1 (MPEG Layer-1 Stream)</option>
                    <option value="mp2">MP2 (MPEG Layer-2 Stream)</option>
                </optgroup>
                <optgroup label="TRUE IMAGE RE-ENCODE (Canvas Core)">
                    <option value="png" selected>PNG (Lossless Matrix Image)</option>
                    <option value="jpg">JPG (Compressed Matrix Image)</option>
                    <option value="jpeg">JPEG (Compressed Matrix Image)</option>
                </optgroup>
                <optgroup label="TRUE DOCUMENT GENERATION (jsPDF/Structure)">
                    <option value="pdf">PDF (True Vector Adobe Layout)</option>
                    <option value="docx">DOCX (OpenXML Compressed Document)</option>
                    <option value="doc">DOC (Legacy Word Document Object)</option>
                    <option value="pptx">PPTX (OpenXML Presentation Block)</option>
                </optgroup>
            </select>
        </div>

        <button class="btn-process" onclick="executeConversion()">Execute Deep Structural Rewrite</button>

        <div class="status-container" id="status-box">
            <p id="status-text">System core standing by, sir...</p>
        </div>
    </div>

    <canvas id="conversion-canvas"></canvas>

    <script src="converter-core.js"></script>
</body>
</html>
