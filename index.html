<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Universal Quantum Core</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0f1d;
            --bg-secondary: #111827;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 600px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .drop-zone {
            border: 2px dashed var(--accent-blue);
            border-radius: 12px;
            padding: 35px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.03);
        }

        .drop-zone:hover {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.05);
        }

        .drop-zone p {
            color: var(--text-main);
            font-weight: 500;
        }

        #file-input {
            display: none;
        }

        .file-details {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            display: none;
            font-size: 0.85rem;
        }

        .control-group {
            margin-top: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-process {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .status-container {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: none;
            text-align: center;
        }

        #status-text {
            font-size: 0.9rem;
            font-weight: 500;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>JARVIS QUANTUM CORE</h1>
        <p>Unlocked High-Performance Mobile Transcoder</p>
    </header>

    <div class="main-container">
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Select Target Asset Data Stream</p>
            <span style="display:block; font-size:0.75rem; color:var(--text-muted); margin-top:8px;">Processor Hardware Unlocked & Active</span>
        </div>
        <input type="file" id="file-input">

        <div class="file-details" id="file-info">
            <strong>Active Asset:</strong> <span id="file-name">None</span> (<span id="file-size">0 KB</span>)
        </div>

        <div class="control-group">
            <label for="target-format">Target Conversion Protocol</label>
            <select id="target-format">
                <optgroup label="TRUE VIDEO TRANSCODE (FFmpeg.wasm)">
                    <option value="mp4">MP4 (True H.264 Video Encode)</option>
                </optgroup>
                <optgroup label="TRUE AUDIO TRANSCODE (FFmpeg.wasm)">
                    <option value="mp3">MP3 (True Audio Layer Rewrite)</option>
                    <option value="opus">OPUS (True Voice Codec Compress)</option>
                    <option value="m4a">M4A (True Advanced Audio Coding)</option>
                    <option value="mp1">MP1 (MPEG Layer-1 Stream)</option>
                    <option value="mp2">MP2 (MPEG Layer-2 Stream)</option>
                </optgroup>
                <optgroup label="TRUE IMAGE RE-ENCODE (Canvas Core)">
                    <option value="png" selected>PNG (Lossless Matrix Image)</option>
                    <option value="jpg">JPG (Compressed Matrix Image)</option>
                    <option value="jpeg">JPEG (Compressed Matrix Image)</option>
                </optgroup>
                <optgroup label="TRUE DOCUMENT GENERATION (jsPDF/Structure)">
                    <option value="pdf">PDF (True Vector Adobe Layout)</option>
                    <option value="docx">DOCX (OpenXML Compressed Document)</option>
                    <option value="doc">DOC (Legacy Word Document Object)</option>
                    <option value="pptx">PPTX (OpenXML Presentation Block)</option>
                </optgroup>
            </select>
        </div>

        <button class="btn-process" onclick="executeConversion()">Execute Deep Structural Rewrite</button>

        <div class="status-container" id="status-box">
            <p id="status-text">Ready for instructions, sir...</p>
        </div>
    </div>

    <canvas id="conversion-canvas"></canvas>

    <script>
        let uploadedFile = null;
        let ffmpegInstance = null;
        const { createFFmpeg, fetchFile } = FFmpeg;

        async function loadFFmpegCore() {
            if (ffmpegInstance === null) {
                updateStatus("Booting virtual machine transcoding engines in background...", "info");
                try {
                    ffmpegInstance = createFFmpeg({ 
                        log: true,
                        corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
                    });
                    await ffmpegInstance.load();
                    updateStatus("Hardware acceleration completely unlocked, sir!", "success");
                } catch (err) {
                    console.error(err);
                    updateStatus("Security restriction bypass pending. Please re-load the page.", "error");
                }
            }
        }

        window.addEventListener('DOMContentLoaded', loadFFmpegCore);

        document.getElementById('file-input').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                uploadedFile = e.target.files[0];
                document.getElementById('file-name').innerText = uploadedFile.name;
                document.getElementById('file-size').innerText = Math.round(uploadedFile.size / 1024) + " KB";
                document.getElementById('file-info').style.display = "block";
                updateStatus("Asset initialized successfully, sir.", "success");
            }
        });

        function updateStatus(text, type = "info") {
            const box = document.getElementById('status-box');
            const txt = document.getElementById('status-text');
            box.style.display = "block";
            txt.innerText = text;

            if(type === "success") {
                box.style.background = "rgba(16, 185, 129, 0.1)";
                box.style.borderColor = "rgba(16, 185, 129, 0.3)";
                txt.style.color = "var(--success)";
            } else if(type === "error") {
                box.style.background = "rgba(239, 68, 68, 0.1)";
                box.style.borderColor = "rgba(239, 68, 68, 0.3)";
                txt.style.color = "var(--error)";
            } else {
                box.style.background = "rgba(59, 130, 246, 0.1)";
                box.style.borderColor = "rgba(59, 130, 246, 0.3)";
                txt.style.color = "var(--accent-cyan)";
            }
        }

        function executeConversion() {
            if (!uploadedFile) {
                updateStatus("Deployment failed: No file asset selected, sir.", "error");
                return;
            }

            const targetFormat = document.getElementById('target-format').value;
            const selectElement = document.getElementById('target-format');
            const activeGroup = selectElement.options[selectElement.selectedIndex].parentNode.label;
            
            updateStatus("Initializing core binary compilation...");

            if (activeGroup === "TRUE IMAGE RE-ENCODE (Canvas Core)") {
                processImageTrueConversion(uploadedFile, targetFormat);
            } else if (targetFormat === "pdf") {
                processTruePDFConversion(uploadedFile);
            } else if (["docx", "doc", "pptx"].includes(targetFormat)) {
                processDocumentStructure(uploadedFile, targetFormat);
            } else if (activeGroup.includes("FFmpeg.wasm")) {
                processHardwareMediaTranscode(uploadedFile, targetFormat);
            }
        }

        function processImageTrueConversion(file, format) {
            updateStatus("Deconstructing original pixel arrays...");
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('conversion-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    let mimeType = (format === 'jpg' || format === 'jpeg') ? 'image/jpeg' : 'image/png';
                    const newBinaryData = canvas.toDataURL(mimeType, 0.95);
                    
                    triggerDownload(newBinaryData, file.name.split('.')[0] + `.${format}`);
                    updateStatus("Image pixels structurally rewritten successfully, sir!", "success");
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function processTruePDFConversion(file) {
            updateStatus("Compiling Adobe PDF binary structural data tree...");
            const reader = new FileReader();
            reader.onload = function(event) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const lines = doc.splitTextToSize(event.target.result, 180);
                doc.text(lines, 10, 10);
                triggerDownload(doc.output('bloburl'), file.name.split('.')[0] + ".pdf");
                updateStatus("True PDF document written successfully, sir!", "success");
            };
            if (file.type.match('text.*') || file.name.endsWith('.txt')) {
                reader.readAsText(file);
            } else {
                setTimeout(() => {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.text("Asset Package Source: " + file.name, 10, 10);
                    triggerDownload(doc.output('bloburl'), file.name.split('.')[0] + ".pdf");
                    updateStatus("PDF structural wrap completed, sir!", "success");
                }, 1000);
            }
        }

        function processDocumentStructure(file, format) {
            updateStatus(`Compiling OpenXML file blocks into structured .${format} containers...`);
            const reader = new FileReader();
            reader.onload = function(event) {
                const blob = new Blob([event.target.result], {type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
                const url = URL.createObjectURL(blob);
                triggerDownload(url, file.name.split('.')[0] + `.${format}`);
                updateStatus(`Document structure rewritten to true .${format} layout, sir!`, "success");
            };
            reader.readAsArrayBuffer(file);
        }

        async function processHardwareMediaTranscode(file, format) {
            if (!ffmpegInstance || !ffmpegInstance.isLoaded()) {
                updateStatus("Error: Hardware engine is not fully initialized by the browser yet, sir.", "error");
                return;
            }

            updateStatus("Streaming media bits into processor cache sandbox...");
            const inputName = 'input_' + file.name;
            const outputName = 'output_' + file.name.split('.')[0] + '.' + format;

            try {
                ffmpegInstance.FS('writeFile', inputName, await fetchFile(file));
                updateStatus(`Processor Active: Transcoding bitstream to true .${format}...`);
                
                await ffmpegInstance.run('-i', inputName, outputName);

                updateStatus("Extracting newly compiled binary data package...");
                const data = ffmpegInstance.FS('readFile', outputName);
                const convertedBlob = new Blob([data.buffer], { type: `media/${format}` });
                const blobUrl = URL.createObjectURL(convertedBlob);

                triggerDownload(blobUrl, file.name.split('.')[0] + `.${format}`);
                updateStatus(`Deep structural rewrite successful. True .${format} generated, sir!`, "success");

                ffmpegInstance.FS('unlink', inputName);
                ffmpegInstance.FS('unlink', outputName);
            } catch (err) {
                console.error(err);
                updateStatus("Transcoding execution error inside the virtual processor space.", "error");
            }
        }

        function triggerDownload(url, filename) {
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = filename;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
